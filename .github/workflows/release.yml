name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Semver bump (from latest v* tag, or 0.1.0 if none)
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

permissions:
  contents: write
  pull-requests: write

env:
  CARGO_TERM_COLOR: always

jobs:
  bump:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
      pr_number: ${{ steps.open_pr.outputs.pr_number }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT || github.token }}

      - id: bump
        shell: bash
        run: |
          set -euo pipefail
          BUMP="${{ inputs.bump }}"
          LATEST="$(git tag -l 'v*' --sort=-v:refname | head -1)"
          if [[ -z "$LATEST" ]]; then
            BASE="0.1.0"
          else
            BASE="${LATEST#v}"
          fi
          IFS=. read -r MAJOR MINOR PATCH <<< "$BASE"
          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
            *) echo "Unknown bump: $BUMP"; exit 1 ;;
          esac
          VERSION="${MAJOR}.${MINOR}.${PATCH}"
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Bumping ${LATEST:-<none>} → ${TAG} (${BUMP})"

      - name: Set workspace version
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          sed -i '/^\[workspace\.package\]/,/^\[/{ s/^version = ".*"/version = "'"${VERSION}"'"/; }' Cargo.toml
          grep -A2 '^\[workspace.package\]' Cargo.toml

      - name: Sync OpenAPI info.version
        run: |
          jq --arg v "${{ steps.bump.outputs.version }}" '.info.version = $v' \
            engine/broker-server/openapi/bettermq.openapi.json > /tmp/openapi.json
          mv /tmp/openapi.json engine/broker-server/openapi/bettermq.openapi.json

      - name: Commit version bump and tag
        id: commit
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml engine/broker-server/openapi/bettermq.openapi.json
          if git diff --staged --quiet; then
            echo "nothing=true" >> "$GITHUB_OUTPUT"
            echo "Nothing to commit"
            exit 0
          fi
          TAG="${{ steps.bump.outputs.tag }}"
          git commit -m "chore(release): ${TAG}"
          git tag "${TAG}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      # secrets.* cannot be used in step if: — detect PAT via env in a prior step
      - id: pat_check
        env:
          RELEASE_PAT: ${{ secrets.RELEASE_PAT }}
        run: |
          if [[ -n "${RELEASE_PAT:-}" ]]; then
            echo "has_pat=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_pat=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Push to main (RELEASE_PAT)
        if: steps.commit.outputs.nothing != 'true' && steps.pat_check.outputs.has_pat == 'true'
        run: |
          set -euo pipefail
          git push origin HEAD:main "${{ steps.commit.outputs.tag }}"

      - name: Push release branch (no RELEASE_PAT)
        id: release_branch
        if: steps.commit.outputs.nothing != 'true' && steps.pat_check.outputs.has_pat == 'false'
        run: |
          set -euo pipefail
          TAG="${{ steps.commit.outputs.tag }}"
          BRANCH="chore/release-${TAG}"
          git checkout -b "${BRANCH}"
          git push origin "${BRANCH}" "${TAG}"
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"

      - name: Open pull request (manual merge required)
        id: open_pr
        if: steps.release_branch.outputs.branch != ''
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT || github.token }}
        run: |
          set -euo pipefail
          TAG="${{ steps.bump.outputs.tag }}"
          BRANCH="${{ steps.release_branch.outputs.branch }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          BODY="Automated version bump from the [Release workflow](${RUN_URL}).

          - Bumps Cargo.toml and OpenAPI info.version to ${{ steps.bump.outputs.version }}
          - Tag ${TAG} is pushed; build + GitHub release follow in this workflow
          - **Requires your review and merge** after rust CI passes (not auto-merged)"
          if ! gh pr create --base main --head "${BRANCH}" --title "chore(release): ${TAG}" --body "${BODY}"; then
            if gh pr view "${BRANCH}" --json number --jq .number 2>/dev/null; then
              echo "PR already exists for ${BRANCH}"
            else
              echo "::error::Could not create PR. Enable Settings → Actions → Allow GitHub Actions to create and approve pull requests, or add RELEASE_PAT to push main directly."
              exit 1
            fi
          fi
          PR="$(gh pr view "${BRANCH}" --json number --jq .number)"
          echo "pr_number=${PR}" >> "$GITHUB_OUTPUT"
          echo "Open PR #${PR} — merge manually when ready: ${RUN_URL}"

  build:
    needs: bump
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: bettermq-linux-amd64
          - os: macos-14
            target: aarch64-apple-darwin
            artifact: bettermq-macos-arm64
          - os: macos-14
            target: x86_64-apple-darwin
            artifact: bettermq-macos-amd64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: bettermq-windows-amd64.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump.outputs.tag }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build broker-server
        run: cargo build -p broker-server --release --target ${{ matrix.target }}

      - name: Stage binary
        shell: bash
        run: |
          mkdir -p dist
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp "target/${{ matrix.target }}/release/bettermq.exe" "dist/${{ matrix.artifact }}"
          else
            cp "target/${{ matrix.target }}/release/bettermq" "dist/${{ matrix.artifact }}"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  publish:
    needs: [bump, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Zip artifacts
        run: |
          cd dist
          for f in *; do
            if [[ -f "$f" && "$f" != *.zip ]]; then
              zip "${f}.zip" "$f"
            fi
          done
          sha256sum *.zip > checksums.txt
          cat checksums.txt
          ls -la

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.bump.outputs.tag }}
          name: BetterMQ ${{ needs.bump.outputs.version }}
          generate_release_notes: true
          files: |
            dist/*.zip
            dist/checksums.txt
